version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: shutterscore-db
    restart: always
    environment:
      POSTGRES_USER: shutter_user
      POSTGRES_PASSWORD: shutter_secure_pass_2026
      POSTGRES_DB: shutterscore
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shutter_user -d shutterscore"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
