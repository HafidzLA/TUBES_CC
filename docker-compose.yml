version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: shutterscore-local-db
    restart: always
    environment:
      POSTGRES_USER: shutter_user
      POSTGRES_PASSWORD: shutter_secure_pass_2026
      POSTGRES_DB: shutterscore
    ports:
      - "5432:5432"
    volumes:
      - postgres_local_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shutter_user -d shutterscore"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shutterscore-local-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      DATABASE_URL: postgresql://shutter_user:shutter_secure_pass_2026@db:5432/shutterscore
      JWT_SECRET: shutter_score_secret_jwt_key_2026
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: shutterscore-local-frontend
    restart: always
    ports:
      - "8080:80"
    environment:
      - VITE_API_URL=http://localhost:5000
    depends_on:
      - backend

volumes:
  postgres_local_data:
